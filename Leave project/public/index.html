<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: #ff8c00;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            color: white;
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
            font-size: 26px;
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .company-logo {
            display: block;
            width: min(100%, 480px);
            height: auto;
            max-height: 260px;
            object-fit: contain;
        }

        label {
            display: block;
            margin: 4px 0 6px;
            font-weight: 700;
        }

        input,
        select,
        textarea,
        button {
            width: 100%;
            font: inherit;
            border-radius: 8px;
        }

        input,
        select,
        textarea {
            display: block;
            padding: 11px;
            margin-bottom: 12px;
            border: none;
            outline: none;
            color: #111827;
            font-size: 16px;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        select {
            min-height: 44px;
            background: white;
            font-weight: 700;
        }

        select:invalid {
            color: #6b7280;
            font-weight: 600;
        }

        option {
            color: #111827;
            font-size: 16px;
            font-weight: 700;
        }

        button {
            padding: 12px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 4px;
            font-weight: 700;
        }

        button:hover {
            background: #222;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .secondary-button {
            margin-top: 0;
            margin-bottom: 12px;
            background: white;
            color: #111827;
        }

        .secondary-button:hover {
            background: #f3f4f6;
        }



        .hidden {
            display: none;
        }

        .message {
            min-height: 20px;
            margin-top: 12px;
            text-align: center;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-wrap">
            <img class="company-logo"
                src="https://drive.google.com/thumbnail?id=1oqFkpO8Hhv7IEYeKXWq19uubuKeFHCZ9&amp;sz=w800"
                alt="Analytics Career Connect logo">
        </div>

        <h2>Apply Leave</h2>

        <form id="form" novalidate>
            <input name="name" placeholder="Full Name" required>
            <input name="employeeId" placeholder="Employee ID" required>

            <label for="startDate">Start Date</label>
            <input id="startDate" type="date" name="startDate" required>

            <label for="endDate">End Date</label>
            <input id="endDate" type="date" name="endDate" required>

            <label for="batch">Batch</label>
            <select id="batch" name="team" required>
                <option value="">Select Batch</option>
                <option value="Full Time">Full Time</option>
                <option value="Part Time">Part Time</option>
            </select>

            <textarea name="reason" placeholder="Reason for leave" required></textarea>
            <input id="studentEmail" type="email" name="email" placeholder="Email (Example: student@gmail.com)" required>


            <button id="submitBtn" type="submit">Apply Leave</button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        const API_BASE = location.protocol === "file:" ? "http://localhost:3000" : "";
        const form = document.getElementById("form");
        const studentEmail = document.getElementById("studentEmail");
        const submitBtn = document.getElementById("submitBtn");
        const message = document.getElementById("message");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const data = Object.fromEntries(new FormData(form));

            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const emailError = getEmailError(data.email);
            if (emailError) {
                alert(emailError);
                studentEmail.focus();
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Submitting...";
            message.textContent = "";

            try {
                const res = await fetch(API_BASE + "/apply-leave", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const text = await res.text();

                if (!res.ok) {
                    message.textContent = text || "Leave apply nahi hua. Server error.";
                    return;
                }

                message.textContent = text || "Leave Applied Successfully";
                form.reset();
            } catch (err) {
                message.textContent = "Server connect nahi ho raha.";
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Apply Leave";
            }
        });


        function normalizeEmail(email) {
            return String(email || "").trim().toLowerCase();
        }

        function getEmailError(email) {
            const trimmedEmail = normalizeEmail(email);

            if (!trimmedEmail) {
                return "Please enter your email address.";
            }

            if (trimmedEmail.startsWith("@")) {
                return "Email me @ se pehle name likho. Example: student@gmail.com";
            }

            if (!/^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(trimmedEmail)) {
                return "Please enter a valid email address. Example: student@gmail.com";
            }

            return "";
        }
    </script>
</body>

</html>
